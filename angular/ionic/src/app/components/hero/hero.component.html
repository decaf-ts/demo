<section class="hero" id="hero">
  <app-header title="Dashboard" />
  <app-container>
    <div class="dcf-inline-flex dcf-flex-center dcf-margin-medium-top">
      <div class=" text-white dcf-text-center ">
        <div class="">
          <ion-chip id="chip" outline class="dcf-padding-xsmall dcf-text-bold text-white">
            <ion-icon name="play-outline" color="light"></ion-icon>
            <ion-label class="dcf-text-uppercase">Latest news from Decaf v0.2</ion-label>
          </ion-chip>
        </div>
        <h1 class="title dcf-text-bold full-width-text d-inline-block">{{ title }}</h1>
        <p class="description mb-4 dcf-width-2-3 mx-auto">{{ description }}</p>
        <ion-button class="me-3 dcf-text-capitalize" color="light" shape="round" routerLink="/modules">{{
          button1Text
          }}</ion-button>
        <ion-button class="dcf-text-capitalize" color="light" shape="round" fill="outline">{{
          button2Text
          }}</ion-button>
      </div>
    </div>

  </app-container>
  <!-- <div class="sample-div"></div> -->
</section>
