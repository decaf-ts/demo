<section class="code-section" id="code-section">

      <div class="info text-white">
        <h1 class="title fs-1">{{ title }}</h1>
        <p class="description mb-4">{{ description }}</p>
        <ion-button class="me-3" color="light" shape="round">{{
          button1Text

        <ion-button color="light" shape="round" fill="outline">{{

          }}</ion-button>
      </div>
    </div>
  </app-container>
</section>
