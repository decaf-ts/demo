<section [class.muted]="backgroundColor === 'muted'">
  <app-container size="2xlarge">
    <div class="dcf-flex dcf-flex-center">
      <div class="dcf-flex">
        <div class="info dcf-text-center">
          <div class="meta">{{ meta }}</div>
          <h1 class="title dcf-text-bold fs-1">{{ title }}</h1>
          <p class="description">{{ description }}</p>
        </div>
      </div>
    </div>
    <div class="dcf-child-width-1-1 overflow-x-hidden">
      <div class="dcf-flex dcf-margin-large-top dcf-margin-large-bottom track">
        @for(sampleModule of modules; let idx = $index; track sampleModule.title + idx) {
        <div class="sampleModule dcf-margin-large-right">
          <div class="">{{sampleModule.title}}</div>
          <div class="mt-3">{{sampleModule.description}}</div>
        </div>

        }
      </div>
    </div>
  </app-container>
</section>
